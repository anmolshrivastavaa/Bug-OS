<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug OS</title>
  <link rel="icon" type="image/png" href="assets/header%20icon.png" />
  <script src="/cm-bundle.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Jspreadsheet CE CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/jspreadsheet.min.css" type="text/css" />
  <!-- jSuites CSS (Required dependency) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@4/dist/jsuites.min.css" type="text/css" />

  <!-- jSuites JS -->
  <script src="https://cdn.jsdelivr.net/npm/jsuites@4/dist/jsuites.min.js"></script>
  <!-- Jspreadsheet CE JS -->
  <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/index.min.js"></script>
</head>

<body>
  <div class="app" id="app"></div>
  <div class="toast-container" id="toasts"></div>
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-title" id="confirm-title">Confirm Delete</div>
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Delete permanently</button>
      </div>
    </div>
  </div>

  <input type="hidden" id="excel-capture-target">
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>

</html>
