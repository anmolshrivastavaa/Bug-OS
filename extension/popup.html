<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BugOS Capture</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="sidebar_icon.png" alt="BugOS" style="height: 32px; width: auto;"> BugOS Capture
      </div>
      <button id="btnLogout" class="btn-icon hidden" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </header>

    <!-- Connection Error -->
    <div id="connectionError" class="alert error hidden">
      Connecting to BugOS server...
    </div>

    <!-- Login View -->
    <div id="viewLogin" class="view">
      <h2>Login</h2>
      <p class="subtitle">Sign in to attach evidence directly to test cases.</p>
      
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. QA_USER">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      
      <div id="loginError" class="error-text hidden"></div>
      
      <button id="btnLogin" class="btn primary full-width">Sign In</button>
    </div>

    <!-- Main View -->
    <div id="viewMain" class="view hidden">
      <div class="user-info">
        Username - <strong id="lblUsername"></strong>
      </div>
      
      <!-- Draft Capture Mode -->
      <div id="draftCaptureMode" class="hidden" style="margin-bottom: 16px; padding: 16px; background: rgba(37, 99, 235, 0.05); border: 1px solid rgba(37, 99, 235, 0.2); border-radius: 8px;">
        <p style="font-size:0.875rem; color:var(--primary); font-weight:500; margin-bottom:12px; text-align:center;">Form Auto-Fill Mode</p>
        <button id="btnDraftCapture" class="btn primary full-width">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          Capture Screen
        </button>

        <div id="draftActionContainer" class="hidden" style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; animation: fadeIn 0.3s ease;">
          <p style="font-size: 0.8rem; margin-bottom: 12px; color: var(--text-muted); text-align: center;">Screenshot Ready!</p>
          <div style="display: flex; gap: 8px;">
            <button id="btnDraftFill" class="btn" style="flex: 1; background: transparent; color: var(--success); border: 1px solid var(--success);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              Fill Now
            </button>
            <button id="btnDraftAnnotate" class="btn primary" style="flex: 1;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
              Annotate
            </button>
          </div>
        </div>

        <button id="btnCancelDraft" class="btn full-width" style="margin-top:8px; background:transparent; border:1px solid var(--border); color:var(--text-muted);">Cancel</button>
      </div>

      <div id="normalCaptureMode">
        <div class="form-group" id="missingEvidenceGroup" style="display:none;">
          <label for="selMissingEvidence" style="color: var(--error); margin-bottom: 8px;">Action Required: Missing Evidence</label>
          <select id="selMissingEvidence" style="border-color: rgba(220, 38, 38, 0.4);">
            <option value="">-- View Test Cases Needing Evidence --</option>
          </select>
          <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 6px;">Select to auto-fill the form below</div>
        </div>

        <div class="form-group">
          <label for="selModule">Select Module</label>
          <select id="selModule">
            <option value="">-- Choose Module --</option>
          </select>
        </div>

        <div class="form-group">
          <label for="selTestCase">Select Test Case</label>
          <select id="selTestCase" disabled>
            <option value="">-- Choose Test Case --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Attach as:</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="evidenceSlot" value="evidence" checked> Evidence 1
            </label>
            <label class="radio-label">
              <input type="radio" name="evidenceSlot" value="evidence2"> Evidence 2
            </label>
          </div>
        </div>

        <div id="attachStatus" class="status-message hidden"></div>

        <button id="btnCapture" class="btn primary full-width" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          Capture Screen
        </button>

        <div id="actionContainer" class="hidden" style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; animation: fadeIn 0.3s ease;">
          <p style="font-size: 0.8rem; margin-bottom: 12px; color: var(--text-muted); text-align: center;">Screenshot Ready!</p>
          <div style="display: flex; gap: 8px;">
            <button id="btnAttachNow" class="btn" style="flex: 1; background: transparent; color: var(--success); border: 1px solid var(--success);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              Attach Now
            </button>
            <button id="btnAnnotate" class="btn primary" style="flex: 1;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
              Annotate
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="socket.io.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
