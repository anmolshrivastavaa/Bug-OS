<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Annotate Screenshot - BugOS</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="annotate.css">
</head>
<body>
  <div class="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" id="btnPen" title="Pen Tool (P)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
      </button>
      <button class="tool-btn" id="btnRect" title="Rectangle Tool (R)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
      </button>
    </div>
    
    <div class="tool-group colors">
      <button class="color-btn active" data-color="#dc2626" style="background-color: #dc2626;"></button>
      <button class="color-btn" data-color="#2563eb" style="background-color: #2563eb;"></button>
      <button class="color-btn" data-color="#16a34a" style="background-color: #16a34a;"></button>
      <button class="color-btn" data-color="#eab308" style="background-color: #eab308;"></button>
    </div>

    <div class="tool-group">
      <button class="tool-btn" id="btnUndo" title="Undo (Ctrl+Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
      </button>
      <button class="tool-btn" id="btnClear" title="Clear All">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    </div>

    <div style="flex-grow: 1;"></div>

    <div id="statusMsg" class="status"></div>
    <button id="btnSave" class="save-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      Save & Attach
    </button>
  </div>

  <div class="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <script src="socket.io.min.js"></script>
  <script src="annotate.js"></script>
</body>
</html>
