<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug OS</title>
<link rel="icon" type="image/png" href="header%20icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c0f;
  --bg2: #111418;
  --bg3: #181c22;
  --bg4: #1e242c;
  --border: #252c36;
  --border2: #2e3844;
  --text: #e2e8f0;
  --text2: #8a9ab0;
  --text3: #5a6a7e;
  --accent: #3b82f6;
  --accent2: #1d4ed8;
  --green: #22c55e;
  --green-bg: #052e16;
  --green-border: #166534;
  --red: #ef4444;
  --red-bg: #2a0a0a;
  --red-border: #7f1d1d;
  --yellow: #f59e0b;
  --yellow-bg: #1c1400;
  --yellow-border: #78350f;
  --orange: #f97316;
  --orange-bg: #1a0c00;
  --orange-border: #7c2d12;
  --purple: #a855f7;
  --purple-bg: #1a0a2e;
  --purple-border: #6b21a8;
  --cyan: #06b6d4;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --radius: 6px;
  --radius2: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-logo { display: flex; align-items: center; gap: 12px; padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 42px; height: 42px; flex-shrink: 0; border-radius: 14px; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.logo-icon img { width: 100%; height: 100%; object-fit: contain; }
.logo-text { min-width: 0; }
.logo-mark { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
.logo-name { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 2px; }
.sidebar-user { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.user-role-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; font-family: var(--mono); letter-spacing: 0.05em; }
.role-qa { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
.role-dev { background: #001a2e; color: var(--cyan); border: 1px solid #0c4a6e; }
.role-admin { background: var(--bg4); color: var(--text); border: 1px solid var(--border); }
.user-name { font-size: 13px; color: var(--text); margin-top: 4px; font-weight: 500; }
.nav { padding: 12px 8px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all 0.15s; margin-bottom: 2px; border: 1px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--bg4); color: var(--text); border-color: var(--border2); }
.nav-icon { width: 16px; text-align: center; font-size: 13px; }
.nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 600; font-family: var(--mono); padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.sidebar-switch { padding: 12px 8px 16px; border-top: 1px solid var(--border); }
.switch-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; padding: 0 8px; }
.role-btn { width: 100%; padding: 8px 10px; border-radius: var(--radius); background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; font-family: var(--font); font-size: 12px; text-align: left; transition: all 0.15s; }
.role-btn:hover { border-color: var(--border2); color: var(--text); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.page-title { font-size: 16px; font-weight: 600; }
.page-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* BUTTONS */
.btn { padding: 7px 16px; border-radius: var(--radius); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent2); }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border-color: var(--border); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
.btn-danger:hover { background: #3f0e0e; }
.btn-success { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.btn-success:hover { background: #072a18; }
.btn-warning { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* LOGIN */
.login-screen { display: flex; align-items: center; justify-content: center; width: 100%; padding: 40px; }
.login-card { width: min(420px, calc(100% - 40px)); background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 28px; box-shadow: 0 18px 40px rgba(0,0,0,0.35); }
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.login-copy { font-size: 13px; color: var(--text3); margin-bottom: 22px; }
.login-card .field { margin-bottom: 16px; }
.login-card button { width: 100%; justify-content: center; }
.login-hint { margin-top: 16px; font-size: 12px; color: var(--text3); line-height: 1.5; }

/* CARDS / SECTIONS */
.section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); margin-bottom: 16px; overflow: hidden; }
.section-hdr { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.section-title { font-size: 14px; font-weight: 600; }
.section-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius2); padding: 16px; }
.stat-val { font-size: 28px; font-weight: 600; font-family: var(--mono); line-height: 1; }
.stat-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* TABLE */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); background: var(--bg3); white-space: normal; }
td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 13px; white-space: normal; word-break: break-word; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
.td-id { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; }
.td-title { font-weight: 500; }
.td-truncate { color: var(--text2); font-size: 12px; white-space: normal; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; font-family: var(--mono); white-space: nowrap; border: 1px solid; }
.b-pass { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.b-fail { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
.b-hold { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
.b-retest { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
.b-blocked { background: var(--purple-bg); color: var(--purple); border-color: var(--purple-border); }
.b-open { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
.b-fixed { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
.b-verified { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.b-retest-fail { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
.b-escalated { background: #1a0a2e; color: #c084fc; border-color: #6b21a8; }
.b-high { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
.b-medium { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow-border); }
.b-low { background: #0a1a0a; color: #4ade80; border-color: #166534; }

/* DATE STAMPS */
.date-col { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: normal; }
.date-entry { display: flex; flex-direction: column; gap: 2px; }
.date-entry span { display: flex; align-items: center; gap: 4px; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius2); width: 780px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
.modal-hdr { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg2); z-index: 1; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.close-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; }
.close-btn:hover { background: var(--bg4); color: var(--text); }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.form-full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
.field input, .field select, .field textarea { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { min-height: 80px; resize: vertical; }
.field input::placeholder, .field textarea::placeholder { color: var(--text3); }
.field select option { background: var(--bg3); }
.required { color: var(--red); margin-left: 2px; }

/* FILTERS */
.filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-select { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-family: var(--font); font-size: 12px; padding: 5px 10px; cursor: pointer; outline: none; }
.filter-select:focus { border-color: var(--border2); }

/* AUDIT LOG */
.audit-row { display: flex; gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border); font-size: 12px; }
.audit-row:last-child { border-bottom: none; }
.audit-time { font-family: var(--mono); color: var(--text3); min-width: 130px; }
.audit-event { color: var(--text2); flex: 1; }
.audit-actor { font-family: var(--mono); font-size: 11px; padding: 1px 6px; border-radius: 3px; }
.actor-qa { background: var(--purple-bg); color: var(--purple); }
.actor-admin { background: var(--bg4); color: var(--text); border: 1px solid var(--border); }

/* LOGIN */
.login-screen { position: relative; isolation: isolate; display: flex; min-height: 100vh; align-items: center; justify-content: center; gap: 80px; padding: 64px; background: radial-gradient(circle at top, rgba(59,130,246,0.15), transparent 40%), radial-gradient(circle at bottom right, rgba(34,197,94,0.08), transparent 30%), var(--bg); overflow: hidden; }
.login-screen::before { content: ''; position: absolute; inset: 26px; border: 1px solid rgba(138,154,176,0.28); border-radius: 8px; box-shadow: inset 0 0 0 1px rgba(10,12,15,0.55), 0 0 0 1px rgba(255,255,255,0.03); pointer-events: none; z-index: 0; }
.login-screen::after { content: ''; position: absolute; inset: 26px; border-radius: 8px; background-image: linear-gradient(rgba(138,154,176,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(138,154,176,0.04) 1px, transparent 1px); background-size: 56px 56px; mask-image: radial-gradient(circle at center, rgba(0,0,0,0.55), transparent 82%); pointer-events: none; z-index: 0; }
.login-card { width: min(420px, 100%); padding: 32px; border-radius: var(--radius2); background: var(--bg2); border: 1px solid var(--border2); box-shadow: 0 24px 80px rgba(0,0,0,0.45); }
.login-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.login-copy { color: var(--text3); margin-bottom: 20px; font-size: 13px; line-height: 1.6; }
.login-hint { margin-top: 18px; font-size: 12px; color: var(--text3); font-family: var(--mono); }
.actor-dev { background: #001a2e; color: var(--cyan); }
.login-icon { width: 350px; height: 350px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.login-icon img { width: 100%; height: 100%; object-fit: contain; }
.login-icon, .login-card { position: relative; z-index: 1; }

/* EMPTY */
.empty { text-align: center; padding: 48px; color: var(--text3); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }

/* DETAIL PANEL */
.detail-section { margin-bottom: 20px; }
.detail-section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.detail-item { }
.detail-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.detail-value { font-size: 13px; color: var(--text); }
.timeline { }
.tl-item { display: flex; gap: 12px; padding: 8px 0; border-left: 2px solid var(--border); margin-left: 8px; padding-left: 16px; position: relative; }
.tl-item::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--border2); position: absolute; left: -5px; top: 12px; }
.tl-item.tl-green::before { background: var(--green); }
.tl-item.tl-red::before { background: var(--red); }
.tl-item.tl-yellow::before { background: var(--yellow); }
.tl-item.tl-blue::before { background: var(--accent); }
.tl-date { font-family: var(--mono); font-size: 11px; color: var(--text3); min-width: 120px; }
.tl-text { font-size: 12px; color: var(--text2); }
.tl-actor { font-size: 11px; }

/* CONFIRM DIALOG */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: var(--bg2); border: 1px solid var(--red-border); border-radius: var(--radius2); padding: 24px; width: 400px; }
.confirm-title { font-size: 16px; font-weight: 600; color: var(--red); margin-bottom: 8px; }
.confirm-msg { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
.confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }

/* TOAST */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; min-width: 280px; animation: slideIn 0.2s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.toast-success { border-left: 3px solid var(--green); }
.toast-error { border-left: 3px solid var(--red); }
.toast-info { border-left: 3px solid var(--accent); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 20px; }
.tab { padding: 10px 14px; font-size: 13px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.scrollable { overflow-x: auto; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast-container" id="toasts"></div>
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Confirm Delete</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete permanently</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─────────────────────────── STATE ───────────────────────────
const LOGIN_USERS = {
  QA: { user: 'QA', pass: 'QA@nyneos', role: 'qa' },
  DEV: { user: 'DEV', pass: 'DEV@nyneos', role: 'dev' },
  ADMIN: { user: 'ADMIN', pass: 'ADMIN@nyneos', role: 'admin' }
};

// Socket.IO connection
const socket = io();

let initialDataReceived = false;
let S = {
  auth: { loggedIn: false, user: null },
  role: null,
  view: 'dashboard',
  modules: [],
  testCases: [],
  bugs: [],
  auditLog: [],
  tcCounter: 0,
  bugCounter: 0
};

// Socket.IO event handlers
socket.on('initialData', (serverData) => {
  S = {
    auth: S.auth,
    role: S.role,
    view: S.view,
    modules: serverData.modules || [],
    testCases: serverData.testCases || [],
    bugs: serverData.bugs || [],
    auditLog: serverData.auditLog || [],
    tcCounter: typeof serverData.tcCounter === 'number' ? serverData.tcCounter : 0,
    bugCounter: typeof serverData.bugCounter === 'number' ? serverData.bugCounter : 0
  };
  initialDataReceived = true;
  render();
});

socket.on('dataUpdate', (update) => {
  if (update.type === 'testCase') {
    if (update.data.deleted) {
      if (update.data.module) {
        S.testCases = S.testCases.filter(tc => !(tc.id === update.data.id && tc.module === update.data.module));
      } else {
        // Backward compatibility for old payloads that only sent ID
        S.testCases = S.testCases.filter(tc => tc.id !== update.data.id);
      }
    } else {
      const index = S.testCases.findIndex(tc => tc.id === update.data.id && tc.module === update.data.module);
      if (index !== -1) {
        S.testCases[index] = { ...S.testCases[index], ...update.data };
      } else {
        S.testCases.push(update.data);
      }
    }
  } else if (update.type === 'bug') {
    if (update.data.deleted) {
      S.bugs = S.bugs.filter(bug => bug.id !== update.data.id);
    } else {
      const index = S.bugs.findIndex(bug => bug.id === update.data.id);
      if (index !== -1) {
        S.bugs[index] = { ...S.bugs[index], ...update.data };
      } else {
        S.bugs.push(update.data);
      }
    }
  } else if (update.type === 'audit') {
    S.auditLog.unshift(update.data);
    if (S.auditLog.length > 200) {
      S.auditLog = S.auditLog.slice(0, 200);
    }
  } else if (update.type === 'counters') {
    S.tcCounter = update.data.tcCounter;
    S.bugCounter = update.data.bugCounter;
  } else if (update.type === 'module') {
    if (update.data.deleted) {
      S.modules = S.modules.filter(m => m !== update.data.name);
    } else if (update.data.name && !S.modules.includes(update.data.name)) {
      S.modules.push(update.data.name);
    }
  }
  render();
});

socket.on('error', (err) => {
  console.error('Server error:', err);
  toast((err && err.message) || 'Server connection error', 'error');
});

socket.on('disconnect', () => {
  console.warn('Disconnected from server');
  initialDataReceived = false;
  render();
});

function save() {
  render();
}

function now() {
  const d = new Date();
  const istDate = new Date(d.getTime() + (5.5 * 60 * 60 * 1000));
  return istDate.toISOString().slice(0,10);
}
function nowFull() {
  const d = new Date();
  const istDate = new Date(d.getTime() + (5.5 * 60 * 60 * 1000));
  return istDate.toISOString().slice(0,16).replace('T',' ');
}

function textMatchesQuery(v, q) {
  if (!q) return true;
  return String(v || '').toLowerCase().includes(q.toLowerCase());
}

let _liveFilterTimer = null;
function liveFilter(el) {
  const id = el && el.id ? el.id : '';
  const start = el && typeof el.selectionStart === 'number' ? el.selectionStart : null;
  const end = el && typeof el.selectionEnd === 'number' ? el.selectionEnd : null;
  if (_liveFilterTimer) clearTimeout(_liveFilterTimer);
  _liveFilterTimer = setTimeout(() => {
    render();
    if (!id) return;
    const next = document.getElementById(id);
    if (!next) return;
    next.focus();
    if (typeof start === 'number' && typeof end === 'number' && next.setSelectionRange) {
      const s = Math.min(start, next.value.length);
      const e = Math.min(end, next.value.length);
      next.setSelectionRange(s, e);
    }
  }, 0);
}

function loginUser() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value.trim();
  const auth = Object.values(LOGIN_USERS).find(u => u.user === username && u.pass === password);
  if (!auth) {
    toast('Invalid username or password', 'error');
    return;
  }
  S.auth = { loggedIn: true, user: auth.user };
  S.role = auth.role;
  S.view = 'dashboard';
  save();
  toast(`Welcome ${auth.user}`, 'success');
}

function logout() {
  S.auth = { loggedIn: false, user: null };
  S.role = null;
  S.view = 'dashboard';
  save();
  toast('Logged out successfully', 'info');
}

function audit(event, actor) {
  const auditEntry = { time: nowFull(), event, actor: actor || S.role };
  S.auditLog.unshift(auditEntry);
  if (S.auditLog.length > 200) S.auditLog = S.auditLog.slice(0, 200);

  // Send audit update to server
  socket.emit('updateData', { type: 'audit', data: auditEntry });
}

// ─────────────────────────── TOAST ───────────────────────────
function toast(msg, type='info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icons = {success:'✓', error:'✕', info:'ℹ'};
  el.innerHTML = `<span style="color:${type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--accent)'}">${icons[type]}</span> ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

  const dashQ = (document.getElementById('dashQ') || { value: '' }).value.trim().toLowerCase();
  const dashBugStF = (document.getElementById('dashBugStF') || { value: '' }).value;

  let tData = [...S.testCases];
  if (dashModF) tData = tData.filter(t => t.module === dashModF);
  if (dashStF) tData = tData.filter(t => t.status === dashStF);
  if (dashQ) {
    tData = tData.filter(t => [
      t.id, t.testCase, t.scenario, t.module, t.screen, t.steps, t.expected, t.actual, t.notes, t.evidence, t.status, t.severity
    ].some(v => textMatchesQuery(v, dashQ)));
  }

  let bData = [...S.bugs];
  if (dashModF) bData = bData.filter(b => b.module === dashModF);
  if (dashBugStF) bData = bData.filter(b => b.status === dashBugStF);
  if (dashQ) {
    bData = bData.filter(b => [
      b.id, b.tcId, b.testCase, b.module, b.screen, b.status, b.severity, b.devNotes, b.escalationReason
    ].some(v => textMatchesQuery(v, dashQ)));
  }

  const total = tData.length;
  const pass = tData.filter(t=>t.status==='Pass').length;
  const fail = tData.filter(t=>t.status==='Fail').length;
  const hold = tData.filter(t=>t.status==='Hold').length;
  const openBugs = bData.filter(b=>b.status==='Open').length;
  const fixedBugs = bData.filter(b=>b.status==='Verified').length;

  const modSummary = modList.map(mod => {

    const f = tcs.filter(t=>t.status==='Fail').length;
    const ob = bData.filter(b=>b.module===mod&&b.status==='Open').length;
    const pp = tcs.length ? Math.round(p/tcs.length*100) : 0;
    return `<tr>

    <td>${statusBadge(b.status)}</td>

// ─────────────────────────── BUGS ───────────────────────────
function buildBugs() {

  let data = [...S.bugs];
  if (bugModF) data = data.filter(b => b.module   === bugModF);
  if (bugStF)  data = data.filter(b => b.status   === bugStF);
  if (bugSevF) data = data.filter(b => b.severity === bugSevF);
  if (bugQ) {
    data = data.filter(b => {
      const linkedTc = S.testCases.find(t => t.id === b.tcId && t.module === b.module);
      return [
        b.id, b.tcId, b.testCase, b.module, b.screen, b.status, b.severity, b.devNotes, b.escalationReason,
        linkedTc?.scenario, linkedTc?.steps, linkedTc?.expected, linkedTc?.actual, linkedTc?.notes, linkedTc?.evidence

  }

  const modOpts = S.modules.map(m => `<option value="${m}"${bugModF===m?' selected':''}>${m}</option>`).join('');

  const rows = data.map(b => {
    const isQA  = S.role === 'qa';

    let actions = `<button class="btn btn-ghost btn-sm" onclick="viewBug('${b.id}')">View</button>`;

      actions += ` <button class="btn btn-success btn-sm" data-id="${b.id}" onclick="markFixed(this.dataset.id)">Mark Fixed</button>`;
      actions += ` <button class="btn btn-sm" style="background:#1a0a2e;color:#c084fc;border:1px solid #6b21a8;" data-id="${b.id}" onclick="escalateBug(this.dataset.id)">⬆ Escalate</button>`;
    }
    if (isDev && b.status === 'Escalated') {
      actions += ` <button class="btn btn-success btn-sm" data-id="${b.id}" onclick="markFixed(this.dataset.id)">Mark Fixed</button>`;
    }
    if (isQA) actions += ` <button class="btn btn-danger btn-sm" data-id="${b.id}" onclick="deleteBug(this.dataset.id)">Delete</button>`;
    return `<tr>
      <td class="td-id">${b.id}</td>

  const openBugs = S.bugs.filter(b=>b.status==='Open').length;

  const pct = total ? Math.round(pass/total*100) : 0;

  const modRows = S.modules.map(mod => {

      <tbody>${modRows}</tbody>

// ─────────────────────────── BADGES ───────────────────────────
function statusBadge(s) {
  const m = {Pass:'b-pass',Fail:'b-fail',Hold:'b-hold',Retest:'b-retest',Blocked:'b-blocked',Open:'b-open',Fixed:'b-fixed',Verified:'b-verified','Retest Failed':'b-retest-fail',Escalated:'b-escalated'};
  return `<span class="badge ${m[s]||'b-blocked'}">${s}</span>`;
}
function sevBadge(s) {
  const m = {High:'b-high',Medium:'b-medium',Low:'b-low'};
  return `<span class="badge ${m[s]||'b-medium'}">${s}</span>`;
}

function escHtml(v) {
  return (v || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function isHttpUrl(v) {
  return /^https?:\/\//i.test((v || '').trim());
}

function isImageEvidence(v) {
  const ev = (v || '').trim();
  return /^data:image\//i.test(ev) || /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(ev);
}

function renderEvidenceCell(evidence) {
  const ev = (evidence || '').trim();
  if (!ev) return '—';
  if (/^data:image\//i.test(ev)) {
    return `<a href="${ev}" target="_blank" rel="noopener noreferrer" title="Open attached image" style="display:inline-block;"><img src="${ev}" alt="Evidence" style="width:48px;height:48px;object-fit:cover;border:1px solid var(--border2);border-radius:4px;"></a>`;
  }
  if (isHttpUrl(ev)) {
    const safe = escHtml(ev);
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:none;">${isImageEvidence(ev) ? 'Open Image' : 'Open Link'}</a>`;
  }
  return `<span style="color:var(--text2);">${escHtml(ev)}</span>`;
}

function renderEvidencePreview(previewId, evidence) {
  const container = document.getElementById(previewId);
  if (!container) return;
  const ev = (evidence || '').trim();
  if (!ev) { container.innerHTML = ''; return; }
  if (/^data:image\//i.test(ev) || (isHttpUrl(ev) && isImageEvidence(ev))) {
    const safe = /^data:image\//i.test(ev) ? ev : escHtml(ev);
    container.innerHTML = `<a href="${safe}" target="_blank" rel="noopener noreferrer" style="display:inline-block;margin-top:6px;"><img src="${safe}" alt="Evidence preview" style="max-width:160px;max-height:100px;object-fit:cover;border:1px solid var(--border2);border-radius:4px;"></a>`;
    return;
  }
  if (isHttpUrl(ev)) {
    const safe = escHtml(ev);
    container.innerHTML = `<a href="${safe}" target="_blank" rel="noopener noreferrer" style="font-size:12px;color:var(--accent);text-decoration:none;">Open evidence link</a>`;
    return;
  }
  container.innerHTML = `<div style="font-size:12px;color:var(--text3);">${escHtml(ev)}</div>`;
}

function handleEvidenceUpload(inputEl, textInputId, hiddenInputId, previewId) {
  const file = inputEl && inputEl.files && inputEl.files[0];
  if (!file) return;
  if (!/^image\//i.test(file.type || '')) {
    toast('Please upload an image file for evidence', 'error');
    inputEl.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = (e && e.target && e.target.result) || '';
    const hidden = document.getElementById(hiddenInputId);
    const text = document.getElementById(textInputId);
    if (hidden) hidden.value = dataUrl;
    if (text) text.value = file.name;
    renderEvidencePreview(previewId, dataUrl);
  };
  reader.readAsDataURL(file);
}

function onEvidenceTextChange(textInputId, hiddenInputId, previewId) {
  const text = document.getElementById(textInputId);
  const hidden = document.getElementById(hiddenInputId);
  const txt = (text && text.value ? text.value.trim() : '');
  if (hidden) hidden.value = '';
  renderEvidencePreview(previewId, txt);
}

function submitTC() {
  const id = document.getElementById('f-id').value.trim();
  const tc = document.getElementById('f-tc').value.trim();
  const mod = document.getElementById('f-mod').value;
  const actual = document.getElementById('f-actual').value.trim();
  const expected = document.getElementById('f-expected').value.trim();
  const status = document.getElementById('f-status').value;
  const steps = document.getElementById('f-steps').value.trim();

  if (!id || !tc || !mod || !actual || !expected || !steps) {
    toast('Please fill all required fields', 'error'); return;
  }
  if (S.testCases.find(t => t.id === id && t.module === mod)) {
    toast(`Test Case ID "${id}" already exists in module "${mod}"`, 'error'); return;
  }

  const evidenceText = (document.getElementById('f-evidence') || { value: '' }).value.trim();
  const newTC = {
    id, testCase:tc, scenario:document.getElementById('f-scenario').value.trim(),
    module:mod, screen:document.getElementById('f-screen').value.trim(),
    steps, expected, actual, status,
    severity:document.getElementById('f-sev').value,
    evidence:evidenceText,
    notes:document.getElementById('f-notes').value.trim(),
    createdAt:now(), createdBy:'qa', updatedAt:now(), history:[]
  };

  S.testCases.push(newTC);
  S.tcCounter++;

  audit(`Test case ${id} "${tc}" added to module ${mod} with status ${status}`, 'qa');

  // Send test case update to server
  socket.emit('updateData', { type: 'testCase', data: newTC });
  socket.emit('updateData', { type: 'counters', data: { tcCounter: S.tcCounter, bugCounter: S.bugCounter } });

  if (status === 'Fail' || status === 'Hold') {
    autoCreateBug(newTC);
  }

  closeModal();
  save();
  toast(`Test case ${id} added successfully`, 'success');
}

function autoCreateBug(tc) {
  const bugId = `BUG-${String(S.bugCounter++).padStart(3,'0')}`;
  const bug = {
    id: bugId, tcId: tc.id, testCase: tc.testCase, module: tc.module,
    screen: tc.screen, severity: tc.severity, status: 'Open',
    failedAt: now(), fixedAt: null, retestAt: null, devNotes: '',
    retestResult: null, retestCount: 0,
    history: [{ date: now(), event: `Bug auto-created from failed test case ${tc.id}`, actor: 'qa' }]
  };
  S.bugs.push(bug);

  // Send bug update to server
  socket.emit('updateData', { type: 'bug', data: bug });
  socket.emit('updateData', { type: 'counters', data: { tcCounter: S.tcCounter, bugCounter: S.bugCounter } });

  audit(`Bug ${bugId} auto-created from failed test case ${tc.id} "${tc.testCase}"`, 'qa');
  toast(`Bug ${bugId} auto-created from failed test ${tc.id}`, 'info');
}

  </div>
  `, () => {
    const notes = document.getElementById('dev-notes').value.trim();
    if (!notes) { toast('Please add fix notes', 'error'); return; }
    const b = S.bugs.find(x=>x.id===bugId);
    if (!b) return;
    b.status = 'Fixed';
    b.fixedAt = now();
    b.devNotes = notes;
    b.history.push({ date: now(), event: `Marked as Fixed by Dev. Notes: ${notes}`, actor: 'dev' });

    // Send bug update to server
    socket.emit('updateData', { type: 'bug', data: b });

    audit(`Bug ${bugId} marked as Fixed by Developer`, 'dev');
    closeModal();
    save();
    toast(`Bug ${bugId} marked as fixed — awaiting QA retest`, 'success');

}

function retestPass(bugId) {
  if (!initialDataReceived) { toast('Waiting for server data...', 'error'); return; }
  const b = S.bugs.find(x=>x.id===bugId);
  if (!b) return;
  const tc = S.testCases.find(t => t.id === b.tcId && t.module === b.module);
  openConfirm('Confirm Retest Pass',
    `Mark bug ${bugId} as PASSED?\n\nTest case "${b.testCase}" will be updated to PASS status and returned to Test Cases.`,
    () => {
      b.status = 'Verified';
      b.retestAt = now();
      b.retestCount++;
      b.retestResult = 'Pass';
      b.history.push({ date: now(), event: 'Retest PASSED by QA — bug verified and closed', actor: 'qa' });
      if (tc) {
        tc.status = 'Pass';
        tc.updatedAt = now();
        tc.history = tc.history || [];
        tc.history.push({ date: now(), event: `Retest passed — test case restored to PASS status` });

        // Send updates to server
        socket.emit('updateData', { type: 'testCase', data: tc });
      }

      // Send bug update to server
      socket.emit('updateData', { type: 'bug', data: b });

      audit(`Bug ${bugId} retest PASSED — test case ${b.tcId} restored to Pass`, 'qa');
      save();
      toast(`Retest passed! Bug ${bugId} verified. Test case ${b.tcId} is now PASS.`, 'success');
    },
    'Confirm',
    'btn-success');
}

function retestFail(bugId) {
  if (!initialDataReceived) { toast('Waiting for server data...', 'error'); return; }
  const b = S.bugs.find(x=>x.id===bugId);
  if (!b) return;
  b.status = 'Retest Failed';
  b.retestAt = now();
  b.retestCount++;
  b.retestResult = 'Fail';
  b.fixedAt = null;
  b.history.push({ date: now(), event: `Retest FAILED by QA — bug re-opened (Retest #${b.retestCount})`, actor: 'qa' });
  const tc = S.testCases.find(t => t.id === b.tcId && t.module === b.module);
  if (tc) {
    tc.status = 'Fail';
    tc.updatedAt = now();

    // Send test case update to server
    socket.emit('updateData', { type: 'testCase', data: tc });
  }

  // Send bug update to server
  socket.emit('updateData', { type: 'bug', data: b });

  audit(`Bug ${bugId} retest FAILED — returned to bug queue as "Retest Failed"`, 'qa');
  save();
  toast(`Retest failed. Bug ${bugId} returned to queue.`, 'error');
}

function deleteTC(id, module) {
  if (!initialDataReceived) { toast('Waiting for server data...', 'error'); return; }
  const tc = S.testCases.find(t => t.id === id && t.module === module);
  if (!tc) return;
  openConfirm('Permanently Delete Test Case',
    `Delete "${tc.testCase}" (${id})?\n\nThis will also remove any linked bugs and CANNOT be undone. The record will be completely removed from the system.`,
    () => {
      const deletedBugIds = S.bugs.filter(b => b.tcId === id && b.module === module).map(b => b.id);
      S.bugs = S.bugs.filter(b => !(b.tcId === id && b.module === module));
      S.testCases = S.testCases.filter(t => !(t.id === id && t.module === module));
      audit(`Test case ${id} "${tc.testCase}" permanently deleted by QA along with linked bugs`, 'qa');
      socket.emit('updateData', { type: 'testCase', data: { id, module, deleted: true } });
      deletedBugIds.forEach(bugId => {
        socket.emit('updateData', { type: 'bug', data: { id: bugId, deleted: true } });
      });
      save();
      toast(`Test case ${id} permanently deleted`, 'success');
    });
}

function deleteBug(id) {

  openConfirm('Permanently Delete Bug Report',
    `Delete bug "${id}" (${b.testCase})?\n\nThis action is PERMANENT and cannot be undone. The bug record will be completely removed from the system.`,
    () => {
      S.bugs = S.bugs.filter(x => x.id !== id);
      audit(`Bug ${id} "${b.testCase}" permanently deleted by QA`, 'qa');
      socket.emit('updateData', { type: 'bug', data: { id, deleted: true } });
      save();
      toast(`Bug ${id} permanently deleted`, 'success');

function deleteModule(name) {
  if (!initialDataReceived) { toast('Waiting for server data...', 'error'); return; }
  openConfirm('Delete Module',
    `Delete module "${name}"?\n\nAll test cases and bugs in this module will also be permanently deleted. This CANNOT be undone.`,
    () => {
      const deletedTCs = S.testCases.filter(t => t.module === name).map(t => t.id);
      const deletedBugIds = S.bugs.filter(b => b.module === name).map(b => b.id);
      S.testCases = S.testCases.filter(t => t.module !== name);
      S.bugs = S.bugs.filter(b => b.module !== name);
      S.modules = S.modules.filter(m => m !== name);
      audit(`Module "${name}" and ${deletedTCs.length} test cases permanently deleted by QA`, 'qa');
      deletedTCs.forEach(tcId => {
        socket.emit('updateData', { type: 'testCase', data: { id: tcId, module: name, deleted: true } });
      });
      deletedBugIds.forEach(bugId => {
        socket.emit('updateData', { type: 'bug', data: { id: bugId, deleted: true } });
      });
      socket.emit('updateData', { type: 'module', data: { name, deleted: true } });
      save();
      toast(`Module "${name}" permanently deleted`, 'success');
    });
}

function exportCSV() {
  let csv = 'Module,Total Tests,Pass,Fail,Total Bugs,Open Bugs,High Severity\n';
  S.modules.forEach(mod => {
    const tcs = S.testCases.filter(t=>t.module===mod);
    const bugs = S.bugs.filter(b=>b.module===mod);
    csv += `${mod},${tcs.length},${tcs.filter(t=>t.status==='Pass').length},${tcs.filter(t=>t.status==='Fail').length},${bugs.length},${bugs.filter(b=>b.status==='Open').length},${bugs.filter(b=>b.severity==='High').length}\n`;

  const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `qa-report-${now()}.csv`; a.click();
  audit('Report exported as CSV', S.role);
  toast('Report exported', 'success');
}

function submitEditTC() {
  const id       = (document.getElementById('e-tcid')||{value:''}).value;
  const oldMod   = (document.getElementById('e-tcmodold')||{value:''}).value;
  const title    = (document.getElementById('e-tc')||{value:''}).value.trim();
  const mod      = (document.getElementById('e-mod')||{value:''}).value;
  const steps    = (document.getElementById('e-steps')||{value:''}).value.trim();
  const expected = (document.getElementById('e-expected')||{value:''}).value.trim();
  const actual   = (document.getElementById('e-actual')||{value:''}).value.trim();
  const status   = (document.getElementById('e-status')||{value:''}).value;

  if (!title || !mod || !steps || !expected || !actual) {
    toast('Please fill all required fields', 'error'); return;
  }
  const tc = S.testCases.find(t => t.id === id && t.module === oldMod);
  if (!tc) { toast('Test case not found', 'error'); return; }
  if ((oldMod !== mod) && S.testCases.find(t => t !== tc && t.id === id && t.module === mod)) {
    toast(`Test Case ID "${id}" already exists in module "${mod}"`, 'error'); return;
  }

  const oldStatus = tc.status;
  const prevModule = tc.module;
  tc.testCase  = title;
  tc.module    = mod;
  tc.scenario  = (document.getElementById('e-scenario')||{value:''}).value.trim();
  tc.screen    = (document.getElementById('e-screen')||{value:''}).value.trim();
  tc.severity  = (document.getElementById('e-sev')||{value:'Medium'}).value;
  tc.steps     = steps;
  tc.expected  = expected;
  tc.actual    = actual;
  tc.status    = status;
  const evidenceText = (document.getElementById('e-evidence')||{value:''}).value.trim();
  tc.evidence  = evidenceText;
  tc.notes     = (document.getElementById('e-notes')||{value:''}).value.trim();
  tc.updatedAt = now();
  tc.history   = tc.history || [];
  tc.history.push({ date: now(), event: `Edited by QA. Status: ${oldStatus} → ${status}` });

  // Send test case update to server
  socket.emit('updateData', { type: 'testCase', data: tc });

  // Keep linked bug module aligned when test case module changes
  if (prevModule !== mod) {
    S.bugs
      .filter(b => b.tcId === id && b.module === prevModule)
      .forEach(b => {
        b.module = mod;
        b.history = b.history || [];
        b.history.push({ date: now(), event: `Module updated to ${mod} after test case edit`, actor: 'qa' });
        socket.emit('updateData', { type: 'bug', data: b });
      });
  }

  // If newly failing/hold and no active bug, auto-create
  const wasActive = oldStatus === 'Fail' || oldStatus === 'Hold';
  const isActive  = status    === 'Fail' || status    === 'Hold';
  if (isActive && !wasActive) {
    autoCreateBug(tc);
  }
  // If changed to Pass, close any open linked bug
  if (!isActive && wasActive) {
    const linked = S.bugs.find(b => b.tcId === id && b.module === mod && (b.status === 'Open' || b.status === 'Retest Failed'));
    if (linked) {
      linked.status = 'Verified';
      linked.history.push({ date: now(), event: `Bug auto-closed — test case changed to ${status}`, actor: 'qa' });

      // Send bug update to server
      socket.emit('updateData', { type: 'bug', data: linked });

      audit(`Bug ${linked.id} auto-closed (TC ${id} changed to ${status})`, 'qa');
    }
  }

  audit(`Test case ${id} edited by QA — status ${oldStatus} → ${status}`, 'qa');
  closeModal();
  save();
  toast(`Test case ${id} updated`, 'success');
}

// ─────────────────────────── ESCALATE BUG ───────────────────────────
function escalateBug(bugId) {
  if (!initialDataReceived) { toast('Waiting for server data...', 'error'); return; }
  const b = S.bugs.find(x => x.id === bugId);
  if (!b) return;
  showModal('Escalate Bug to Backend Team', `
  <div style="padding:12px 16px;background:#0d0618;border:1px solid #6b21a8;border-radius:var(--radius);margin-bottom:16px;">
    <div style="font-size:11px;color:#c084fc;font-family:var(--mono);margin-bottom:4px">ESCALATING: ${bugId}</div>
    <div style="font-size:14px;font-weight:500">${b.testCase}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px">${b.module} · ${b.screen||'—'} · ${b.severity}</div>
  </div>
  <div style="padding:10px 14px;background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--radius);margin-bottom:16px;font-size:12px;color:var(--yellow);">
    ⚠ Use only when the bug cannot be fixed from the frontend. The backend queue will be updated.
  </div>
  <div class="field">
    <label>Escalation Reason <span class="required">*</span></label>
    <textarea id="esc-reason" placeholder="Describe why this needs backend intervention (e.g. API error, database issue, server-side logic)..."></textarea>
  </div>
  <div class="field">
    <label>Affected Backend Area</label>
    <input id="esc-area" placeholder="e.g. Payment API, Auth service, Database query...">
  </div>
  `, () => {
    const reason = (document.getElementById('esc-reason')||{value:''}).value.trim();
    const area   = (document.getElementById('esc-area')||{value:''}).value.trim();
    if (!reason) { toast('Please describe the escalation reason', 'error'); return; }
    b.status = 'Escalated';
    b.escalatedAt = now();
    b.escalationReason = area ? `${reason} [Area: ${area}]` : reason;
    b.history.push({ date: now(), event: `Escalated to Backend. Reason: ${b.escalationReason}`, actor: 'dev' });

    // Send bug update to server
    socket.emit('updateData', { type: 'bug', data: b });

    audit(`Bug ${bugId} escalated to backend by DEV`, 'dev');
    closeModal(); save();
    toast(`Bug ${bugId} escalated to backend team`, 'info');
  });
}

// ─────────────────────────── DOWNLOAD TEST CASES CSV ───────────────────────────
function downloadTestCasesCSV() {
  const dlMod = (document.getElementById('tcDlMod')||{value:''}).value;
  const dlSt  = (document.getElementById('tcDlSt') ||{value:''}).value;
  let data = [...S.testCases];
  if (dlMod) data = data.filter(t => t.module === dlMod);
  if (dlSt)  data = data.filter(t => t.status === dlSt);
  if (!data.length) { toast('No test cases match selected filters', 'error'); return; }
  const esc = v => `"${(v||'').replace(/"/g,'""')}"`;
  let csv = 'Test Case ID,Test Case,Scenario,Module,Screen Name,Test Steps,Expected Results,Actual Results,Status,Severity,Evidence,Notes,Created,Updated\n';
  data.forEach(tc => {
    csv += `${tc.id},${esc(tc.testCase)},${esc(tc.scenario)},${tc.module},${esc(tc.screen)},${esc(tc.steps)},${esc(tc.expected)},${esc(tc.actual)},${tc.status},${tc.severity},${esc(tc.evidence)},${esc(tc.notes)},${tc.createdAt},${tc.updatedAt}\n`;
  });
  const fname = `test-cases${dlMod?'-'+dlMod:''}${dlSt?'-'+dlSt:''}-${now()}.csv`;
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = fname; a.click();
  toast(`Downloaded ${data.length} test cases`, 'success');
}

// ─────────────────────────── IMPORT CSV ───────────────────────────
let _importRows = [];
let _importTargetModule = '';

function openImportCSV() {
  if (!initialDataReceived) { toast('Waiting for server data...', 'error'); return; }
  if (!S.modules.length) { toast('Please add a module before importing test cases', 'error'); return; }
  _importRows = [];
  _importTargetModule = S.modules[0] || '';
  const moduleOptions = S.modules.map(m => `<option value="${m.replace(/"/g,'&quot;')}">${m}</option>`).join('');
  showModal('Import Test Cases from Excel / CSV', `
  <div class="field" style="margin-bottom:16px;">
    <label>Import To Module <span class="required">*</span></label>
    <select id="imp-module" onchange="setImportModule(this.value)">${moduleOptions}</select>
    <div style="margin-top:6px;font-size:12px;color:var(--text3);">
      All imported test cases in this file will be linked to the selected module.
    </div>
  </div>
  <div style="padding:12px 16px;background:var(--bg3);border-radius:var(--radius);margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.9;">
    <div style="font-weight:600;color:var(--text);margin-bottom:6px;">How to import from Excel / CSV:</div>
    <div style="color:var(--text3);margin-bottom:8px;">1. Choose a CSV, XLSX, or XLS export from your Excel file.</div>
    <div style="font-weight:500;color:var(--text);margin-bottom:4px;">Expected column headers (first row):</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--bg4);padding:8px;border-radius:4px;line-height:2;">
      Test Case ID &nbsp;·&nbsp; Test Case &nbsp;·&nbsp; Scenario &nbsp;·&nbsp; Screen Name &nbsp;·&nbsp; Test Steps &nbsp;·&nbsp; Expected Results &nbsp;·&nbsp; Actual Results &nbsp;·&nbsp; Status &nbsp;·&nbsp; Severity &nbsp;·&nbsp; Evidence &nbsp;·&nbsp; Notes
    </div>
    <div style="margin-top:8px;color:var(--text3);">
      Status must be: <span style="color:var(--green)">Pass</span> / <span style="color:var(--red)">Fail</span> / <span style="color:var(--yellow)">Hold</span> &nbsp;&nbsp; 
      Severity must be: <span style="color:var(--red)">High</span> / <span style="color:var(--yellow)">Medium</span> / <span style="color:var(--green)">Low</span>
    </div>
  </div>
  <div id="imp-dropzone"
       style="border:2px dashed var(--border2);border-radius:var(--radius2);padding:36px;text-align:center;cursor:pointer;transition:all .2s;"
       onclick="document.getElementById('imp-file').click()"
       ondragover="event.preventDefault();document.getElementById('imp-dropzone').style.borderColor='var(--accent)';document.getElementById('imp-dropzone').style.background='rgba(59,130,246,.06)'"
       ondragleave="document.getElementById('imp-dropzone').style.borderColor='';document.getElementById('imp-dropzone').style.background=''"
       ondrop="handleImpDrop(event)">
    <input type="file" id="imp-file" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleImpFile(this)">

    <div style="font-size:14px;color:var(--text);font-weight:500">Click to choose a CSV or Excel file</div>
    <div style="font-size:12px;color:var(--text3);margin-top:6px">or drag and drop your .csv, .xlsx, or .xls file here</div>
  </div>
  <div id="imp-status" style="margin-top:14px;font-size:12px;color:var(--text3);text-align:center;"></div>
  <div id="imp-preview" style="margin-top:14px;"></div>
  `, () => doImport());

function setImportModule(moduleName) {
  _importTargetModule = moduleName || '';
}

function handleImpDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('imp-dropzone');
  if (dz) { dz.style.borderColor = ''; dz.style.background = ''; }
  const f = e.dataTransfer && e.dataTransfer.files[0];
  if (f) parseImpFile(f);
  else toast('No file detected', 'error');
}

function handleImpFile(inp) {
  const f = inp && inp.files && inp.files[0];
  if (f) parseImpFile(f);
}

function parseImpFile(file) {
  const status = document.getElementById('imp-status');
  const preview = document.getElementById('imp-preview');
  const selectedModule = (document.getElementById('imp-module') || { value: '' }).value;
  if (status) status.textContent = `Reading "${file.name}"...`;
  if (preview) preview.innerHTML = '';
  _importRows = [];
  _importTargetModule = selectedModule || _importTargetModule;

  if (!_importTargetModule) {
    if (status) status.innerHTML = `<span style="color:var(--red)">❌ Please select a module before importing.</span>`;
    return;
  }

  // Accept CSV and Excel files
  if (!file.name.match(/\.(csv|xlsx?|txt)$/i)) {
    if (status) status.innerHTML = `<span style="color:var(--red)">❌ Only .csv, .xlsx, or .xls files are supported.</span>`;
    return;
  }

  const reader = new FileReader();
  reader.onerror = () => {
    if (status) status.innerHTML = `<span style="color:var(--red)">❌ Failed to read file.</span>`;
  };
  reader.onload = e => {
    try {
      const raw = e.target.result;
      // Normalize line endings
      const lines = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
      // Remove completely empty lines
      const nonEmpty = lines.filter(l => l.trim().length > 0);

      if (nonEmpty.length < 2) {
        if (status) status.innerHTML = `<span style="color:var(--red)">❌ File appears empty or has no data rows.</span>`;
        return;
      }

      // Parse headers — be very flexible
      const rawHeaders = parseImpLine(nonEmpty[0]);
      const headers = rawHeaders.map(h => h.toLowerCase().trim()
        .replace(/[^a-z0-9 ]/g, ' ')  // strip special chars
        .replace(/\s+/g, ' ')          // collapse spaces
        .trim()
      );

      if (status) status.textContent = `Parsed ${nonEmpty.length - 1} data rows. Mapping columns...`;

      // Column finder — tries multiple aliases
      const col = (aliases) => {
        for (const alias of aliases) {
          const idx = headers.findIndex(h => h === alias || h.includes(alias));
          if (idx >= 0) return idx;
        }
        return -1;
      };

      const colMap = {
        id:       col(['test case id','tc id','id','testcaseid']),
        testCase: col(['test case','testcase','title','test name','name']),
        scenario: col(['scenario','description','desc']),
        screen:   col(['screen name','screen','screenname','page']),
        steps:    col(['test step','test steps','steps','step','teststep','teststeps']),
        expected: col(['expected result','expected results','expected','expected output']),
        actual:   col(['actual result','actual results','actual','actual output']),
        status:   col(['status','result']),
        severity: col(['severity','priority','sev']),
        evidence: col(['evidence','attachment','proof']),
        notes:    col(['notes','note','comment','remarks']),
      };

      const rows = [];
      const warnings = [];

      for (let i = 1; i < nonEmpty.length; i++) {
        const cols = parseImpLine(nonEmpty[i]);
        if (cols.every(c => !c.trim())) continue; // skip blank rows

        const get = (key, fallback = '') => {
          const idx = colMap[key];
          return idx >= 0 ? (cols[idx] || '').trim() : fallback;
        };

        // Normalise Status
        let rawSt = get('status', 'Pass');
        let status = 'Pass';
        if (/^fail/i.test(rawSt))  status = 'Fail';
        else if (/^hold/i.test(rawSt) || /^block/i.test(rawSt)) status = 'Hold';
        else if (/^pass/i.test(rawSt)) status = 'Pass';
        else { warnings.push(`Row ${i+1}: status "${rawSt}" not recognised, defaulted to Pass`); }

        // Normalise Severity
        let rawSev = get('severity', 'Medium');
        let severity = 'Medium';
        if (/^high/i.test(rawSev) || rawSev === '1') severity = 'High';
        else if (/^low/i.test(rawSev) || rawSev === '3') severity = 'Low';
        else if (/^med/i.test(rawSev) || rawSev === '2') severity = 'Medium';

        // Module is selected by user in import flow
        const modVal = _importTargetModule;

        // Generate ID if missing
        let rowId = get('id', '').trim();
        if (!rowId) {
          warnings.push(`Row ${i+1}: missing Test Case ID — row skipped`);
          continue;
        }

        rows.push({
          id:       rowId,
          testCase: get('testCase') || `Imported TC ${i}`,
          scenario: get('scenario'),
          module:   modVal,
          screen:   get('screen'),
          steps:    get('steps'),
          expected: get('expected'),
          actual:   get('actual'),
          status,   severity,
          evidence: get('evidence'),
          notes:    get('notes'),
          _rowNum:  i + 1,
        });
      }

      _importRows = rows;
      renderImpPreview(rows, warnings, file.name);

    } catch(err) {
      console.error('Import parse error:', err);
      if (status) status.innerHTML = `<span style="color:var(--red)">❌ Parse error: ${err.message}</span>`;
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// Robust CSV line parser — handles quoted fields, commas inside quotes, escaped quotes
function parseImpLine(line) {
  const res = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; } // escaped quote ""
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      res.push(cur.trim()); cur = '';
    } else {
      cur += ch;
    }
  }
  res.push(cur.trim());
  return res;
}

function renderImpPreview(rows, warnings, filename) {
  const status  = document.getElementById('imp-status');
  const preview = document.getElementById('imp-preview');
  if (!preview) return;

  const dupes = rows.filter(r => S.testCases.find(t => t.id === r.id && t.module === r.module));
  const newRows = rows.filter(r => !S.testCases.find(t => t.id === r.id && t.module === r.module));

  if (status) status.innerHTML = `
    <span style="color:var(--green)">✓ "${filename}" parsed — ${rows.length} rows found</span>
    <span style="color:var(--accent);margin-left:12px">Module: ${_importTargetModule}</span>
    ${dupes.length ? `<span style="color:var(--yellow);margin-left:12px">⚠ ${dupes.length} duplicate ID(s) will be skipped</span>` : ''}
  `;

  preview.innerHTML = `
    <div style="padding:14px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);">
      <div style="display:flex;gap:16px;margin-bottom:12px;">
        <div style="font-size:12px;"><span style="color:var(--text3)">Total rows:</span> <strong>${rows.length}</strong></div>
        <div style="font-size:12px;"><span style="color:var(--text3)">Will import:</span> <strong style="color:var(--green)">${newRows.length}</strong></div>
        ${dupes.length ? `<div style="font-size:12px;"><span style="color:var(--text3)">Skipped (dup):</span> <strong style="color:var(--yellow)">${dupes.length}</strong></div>` : ''}
        <div style="font-size:12px;"><span style="color:var(--text3)">Auto-bugs:</span> <strong style="color:var(--red)">${newRows.filter(r=>r.status==='Fail'||r.status==='Hold').length}</strong></div>
      </div>
      ${warnings.length ? `<div style="font-size:11px;color:var(--yellow);margin-bottom:10px;padding:6px 10px;background:var(--yellow-bg);border-radius:4px;">${warnings.slice(0,3).join('<br>')}</div>` : ''}
      <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Preview (first 8 rows)</div>
      <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);">
        <table style="width:100%;border-collapse:collapse;min-width:600px;">
          <thead>
            <tr style="background:var(--bg4);">
              <th style="padding:6px 10px;font-size:10px;color:var(--text3);text-align:left;font-weight:500;letter-spacing:.06em;border-bottom:1px solid var(--border);">ID</th>
              <th style="padding:6px 10px;font-size:10px;color:var(--text3);text-align:left;font-weight:500;letter-spacing:.06em;border-bottom:1px solid var(--border);">Test Case</th>
              <th style="padding:6px 10px;font-size:10px;color:var(--text3);text-align:left;font-weight:500;letter-spacing:.06em;border-bottom:1px solid var(--border);">Module</th>
              <th style="padding:6px 10px;font-size:10px;color:var(--text3);text-align:left;font-weight:500;letter-spacing:.06em;border-bottom:1px solid var(--border);">Status</th>
              <th style="padding:6px 10px;font-size:10px;color:var(--text3);text-align:left;font-weight:500;letter-spacing:.06em;border-bottom:1px solid var(--border);">Severity</th>
            </tr>
          </thead>
          <tbody>
            ${rows.slice(0, 8).map(r => {
              const isDupe = S.testCases.find(t => t.id === r.id && t.module === r.module);
              return `<tr style="${isDupe?'opacity:.45;':''}" title="${isDupe?'Will be skipped — duplicate ID':''}">
                <td style="padding:6px 10px;font-family:var(--mono);font-size:11px;color:${isDupe?'var(--yellow)':'var(--text3)'};border-bottom:1px solid var(--border);">${r.id}${isDupe?' (dup)':''}</td>
                <td style="padding:6px 10px;font-size:12px;color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-bottom:1px solid var(--border);">${r.testCase}</td>
                <td style="padding:6px 10px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);">${r.module}</td>
                <td style="padding:6px 10px;border-bottom:1px solid var(--border);">${statusBadge(r.status)}</td>
                <td style="padding:6px 10px;border-bottom:1px solid var(--border);">${sevBadge(r.severity)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${rows.length > 8 ? `<div style="padding:8px 10px;font-size:12px;color:var(--text3);background:var(--bg3);">...and ${rows.length - 8} more rows</div>` : ''}
      </div>
      ${newRows.length === 0 ? `<div style="margin-top:10px;padding:8px 12px;background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--radius);font-size:12px;color:var(--yellow);">All rows are duplicates — nothing new to import.</div>` : ''}
    </div>`;
}

function doImport() {
  if (!_importRows.length) {
    toast('No data loaded — please select a CSV file first', 'error'); return;
  }
  let added = 0, skipped = 0, bugs = 0;
  _importRows.forEach(r => {
    if (S.testCases.find(t => t.id === r.id && t.module === r.module)) { skipped++; return; }
    const { _rowNum, ...tcData } = r; // strip internal field
    const newTC = {
      ...tcData,
      createdAt: now(), createdBy: S.auth && S.auth.user ? S.auth.user : 'QA',
      updatedAt: now(), history: []
    };
    S.testCases.push(newTC);
    S.tcCounter++;
    if (r.status === 'Fail' || r.status === 'Hold') { autoCreateBug(newTC); bugs++; }
    added++;

    // Send test case update to server
    socket.emit('updateData', { type: 'testCase', data: newTC });
  });

  // Send counter update to server
  socket.emit('updateData', { type: 'counters', data: { tcCounter: S.tcCounter, bugCounter: S.bugCounter } });

  audit(`Imported ${added} test cases from CSV (${skipped} duplicates skipped, ${bugs} bugs auto-created)`, S.role || 'qa');
  _importRows = [];
  closeModal();
  save();
  toast(`✓ Imported ${added} test cases${skipped ? `, ${skipped} skipped` : ''}${bugs ? `, ${bugs} bugs created` : ''}`, 'success');
}

// ─────────────────────────── MODAL ENGINE ───────────────────────────
let _submitCb = null;
function showModal(title, body, submitCb, viewOnly=false) {
  _submitCb = submitCb;
  const existing = document.getElementById('app-modal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'app-modal';
  overlay.innerHTML = `<div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">${title}</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${body}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">${viewOnly?'Close':'Cancel'}</button>
      ${!viewOnly?`<button class="btn btn-primary" onclick="modalSubmit()">Save</button>`:''}
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}

function modalSubmit() { if (_submitCb) _submitCb(); }
function closeModal() {
  const m = document.getElementById('app-modal');
  if (m) m.remove();
}

function attachHandlers() {}

function nav(v) { S.view = v; save(); }

// ─── INIT ───
render();
</script>
