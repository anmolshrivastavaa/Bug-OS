version: '3.8'

services:
  bugos-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/bugos
      - PORT=3000
    depends_on:
      - mongodb
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/temp
      - /app/public/videos
    # Use node --watch so the backend auto-restarts on file changes
    command: node --watch server.js

  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
